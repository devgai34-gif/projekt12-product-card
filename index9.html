<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Products Ciborg</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
  />
  
  <link rel="stylesheet" href="style9.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
  <div class="page-wrapper">
    <div class="background"></div>
    <h1 class="title-product main-title">Определите нужный товар </h1>
    
    <div class="products-list-actions">
      <button id="change-color-all-card" class="btn-style">Спросить у ИИ</button>
      <button id="change-color-first-card" class="btn-style">Написать скечь с ИИ</button>
      <button id="open-google" class="btn-style">Открыть Google</button>
      <button id="output-console-log" class="btn-style">Вывести в консоль</button>
      <button id="color-switching" class="bg-red btn-style">Запустить генерацию Кода</button>
    </div>

    <button id="open-modal" class="btn-style">Регистрация</button>

    <div class="overlay">
      <div class="modal">
        <span class="close">&times;</span>
        <h2>Регистрация</h2>
        <form id="registrationForm">
          <label for="firstName">Имя:</label>
          <input type="text" id="firstName" name="firstName" required placeholder="Введите ваше имя">
          
          <label for="lastName">Фамилия:</label>
          <input type="text" id="lastName" name="lastName" required placeholder="Введите вашу фамилию">
          
          <label for="birthDate">Дата рождения:</label>
          <input type="date" id="birthDate" name="birthDate" required>
          
          <label for="login">Логин:</label>
          <input type="text" id="login" name="login" required minlength="3" placeholder="Минимум 3 символа">
          
          <label for="password">Пароль:</label>
          <input type="password" id="password" name="password" required minlength="6" placeholder="Минимум 6 символов">
          
          <label for="confirmPassword">Повторите пароль:</label>
          <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Повторите пароль">
          
          <button type="submit" class="btn-style">Зарегистрироваться</button>
        </form>
      </div>
    </div>
  </div>

  <footer class="site-footer">
    <div class="footer-container">
      <div class="grup-container">
        <div class="footer__brand">
          <div class="footer_logo">Moto Ciborg</div>
          <div class="footer_description">В наличии продукты для искуственной кожи роботов-киборгов!</div>
          <div class="footer_socials">
        <a href="https://t.me/ваш_ник" target="_blank" class="social-link tg-icon">
      <i class="fa-brands fa-telegram"> ТЕЛЕГРАММ ДЛЯ СВЯЗИ</i>
    </a>
  <a href="https://wa.me/номер_телефона" target="_blank" class="social-link wa-icon">
    <i class="fa-brands fa-whatsapp"> ВАЦАП ДЛЯ СВЯЗИ</i>
  </a>
</div>
    
<div class="footer__subscribe">
          <div class="footer__subscribe-title"> СКИДКИ ПО ПРОМОКОДАМ:</div>
          <form class="input-button">
            <input type="email" placeholder="Введите Email" class="subscribe-input" required>
            <button type="submit" class="subscribe-btn">ПОДКЛЮЧИТЬСЯ</button>
          </form>
        </div>

        <nav class="footer__nav">
          <a class="footer__nav-link" href="#">ЦЕНТР</a>
          <a class="footer__nav-link" href="#">РАСПРОДАЖА</a>
          <a class="footer__nav-link" href="#">НОМЕРА</a>
                    <div class="footer__nav-title">ССЫЛКИ</div>
        </nav>
      </div>
    </div>
    
    <div class="footer__bottom">
      <div class="footer__divider"></div>
      <p>www.moto-ciborg.com © all rights reserved</p>
    </div>
  </footer>
  <script src="homework-9.js"></script>
</body>
</html>
